{% load static %}
<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#DC2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="ERP Panadería La Colorada — Sistema de gestión de ventas, producción e inventario">
    <title>{% block title %}La Colorada{% endblock %}</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="{% static 'manifest.json' %}">

    <!-- Estilos -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="app-layout">
        <!-- ── Mobile Header ──────────────────────────────────── -->
        <header class="mobile-header">
            <button class="hamburger" id="hamburger" aria-label="Abrir menú">☰</button>
            <span class="mobile-header-title">🍞 LA COLORADA</span>
            <div style="width: 40px;"></div>
        </header>

        <!-- ── Sidebar Overlay (mobile) ───────────────────────── -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- ── Sidebar ────────────────────────────────────────── -->
        {% include "components/sidebar.html" %}

        <!-- ── Main Content ───────────────────────────────────── -->
        <main class="app-main">
            <!-- Messages -->
            {% include "components/messages.html" %}

            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Scripts -->
    <script src="{% static 'js/app.js' %}"></script>

    <!-- PWA Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('{% static "sw.js" %}')
                .catch(function() {});
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
