<!-- Django Messages -->
{% if messages %}
<div class="messages-container">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }}" data-auto-dismiss="5000">
        {% if message.tags == 'success' %}✅
        {% elif message.tags == 'error' %}❌
        {% elif message.tags == 'warning' %}⚠️
        {% else %}ℹ️
        {% endif %}
        {{ message }}
        <button class="alert-close" aria-label="Cerrar">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}
