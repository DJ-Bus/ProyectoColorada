<!DOCTYPE html>
<html lang="es-mx">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas - La Colorada</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border-t-8 border-red-600">
        <div class="p-6">
            <h1 class="text-3xl font-black text-center text-red-600 mb-1">🍞 LA COLORADA</h1>
            <p class="text-center text-gray-400 text-sm mb-6 uppercase tracking-widest">Caja de Sucursal</p>

            <form method="POST" class="space-y-4">
                {% csrf_token %}
                
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">¿Quién vende?</label>
                    {{ form.empleado }}
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Monto Total ($)</label>
                    {{ form.monto }}
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Notas</label>
                    {{ form.notas }}
                </div>

                <button type="submit" class="w-full bg-red-600 text-white py-4 rounded-xl font-black text-xl hover:bg-red-700 transition-all transform active:scale-95 shadow-lg">
                    REGISTRAR VENTA
                </button>
            </form>

            <hr class="my-8">

            <h2 class="font-bold text-gray-700 mb-4 flex items-center">
                <span class="bg-red-100 text-red-600 p-1 rounded-md mr-2">🕒</span> 
                Últimos registros de hoy
            </h2>
            <div class="space-y-3">
                {% for venta in ultimas_ventas %}
                <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg border-l-4 border-green-500">
                    <div>
                        <p class="font-bold text-gray-800">{{ venta.empleado }}</p>
                        <p class="text-xs text-gray-500">{{ venta.fecha|date:"H:i" }}</p>
                    </div>
                    <span class="text-lg font-black text-green-600">${{ venta.monto }}</span>
                </div>
                {% empty %}
                <p class="text-center text-gray-400 italic">No hay ventas registradas hoy.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
